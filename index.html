
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cock Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>ПЭТУШАРЭ 🐓</h1>
        
        <div class="score-container">
            <span id="score">0</span> 💩
        </div>

        <div id="game-area">
            <div id="rooster" onclick="clickRooster(event)">
                <img src="rooster.png" id="rooster-pic" alt="🐓">
            </div>
        </div>

        <div class="shop">
            <p id="shop-label">Магазин какашек</p>
            <button id="upgrade-btn" onclick="buyUpgrade()">
                <span id="btn-text">Купить Обычная 💩</span><br>
                <small>Цена: <span id="price">100</span></small>
            </button>
        </div>

        <div id="final-message" class="hidden">
            <div class="modal">
                <h2>🎉 ТЫ МОЛОДЕЦ! 🎉</h2>
                <p>Закидал пэтуха по полной!</p>
                <button onclick="restartGame()">Ещё раз?</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
